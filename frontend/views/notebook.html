<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TechDesk - Notebook</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }

        .navbar {
            background: #1a1a2e;
            color: white;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 44px;
            flex-shrink: 0;
        }

        .navbar h1 { font-size: 1rem; white-space: nowrap; }
        .navbar .subject-name { font-size: 0.75rem; color: #a0aec0; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
        .navbar a { color: #a0aec0; text-decoration: none; font-size: 0.75rem; white-space: nowrap; }
        .navbar a:hover { color: white; }

        .split-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .textbook-panel {
            width: 50%;
            background: #f8f9fa;
            border-right: 2px solid #1a1a2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: #1a1a2e;
            color: white;
            padding: 5px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .textbook-content {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 0.75rem;
            line-height: 1.5;
            color: #2d3748;
            -webkit-overflow-scrolling: touch;
        }

        .textbook-content h2 { margin-bottom: 8px; color: #1a1a2e; font-size: 0.9rem; }
        .textbook-content h3 { margin: 8px 0 5px; color: #2d3748; font-size: 0.8rem; }
        .textbook-content p { margin-bottom: 8px; }

        .notebook-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .notebook-toolbar {
            background: #2d3748;
            padding: 4px 8px;
            display: flex;
            gap: 5px;
            align-items: center;
            flex-shrink: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .notebook-toolbar button {
            background: #4a5568;
            color: white;
            border: none;
            padding: 3px 7px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .notebook-toolbar button:hover { background: #718096; }
        .notebook-toolbar button.active { background: #3182ce; }

        .color-btn {
            width: 18px;
            height: 18px;
            border-radius: 50% !important;
            border: 2px solid transparent !important;
            padding: 0 !important;
            cursor: pointer;
            flex-shrink: 0;
        }

        .color-btn.active {
            border: 2px solid white !important;
            outline: 1px solid #a0aec0;
        }

        .color-blue { background: #1a56db !important; }
        .color-black { background: #111111 !important; }

        .notebook-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .squared {
            background-color: white;
            background-image:
                linear-gradient(#b0c4de 1px, transparent 1px),
                linear-gradient(90deg, #b0c4de 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .lined {
            background-color: white;
            background-image: linear-gradient(#b0c4de 1px, transparent 1px);
            background-size: 100% 24px;
            background-position: 0 23px;
        }

        canvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        .save-btn {
            background: #38a169 !important;
            color: white;
            border: none;
            padding: 3px 8px !important;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            margin-left: auto;
            flex-shrink: 0;
        }

        .save-btn:hover { background: #2f855a !important; }

        .saved-msg {
            color: #68d391;
            font-size: 0.7rem;
            display: none;
            flex-shrink: 0;
        }

        .demo-badge {
            background: #e9a100;
            color: white;
            font-size: 0.6rem;
            padding: 1px 5px;
            border-radius: 8px;
            font-weight: 700;
        }

        #sizeSlider {
            width: 50px;
            flex-shrink: 0;
        }

        .page-controls {
            background: #1a1a2e;
            padding: 5px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .page-controls button {
            background: #4a5568;
            color: white;
            border: none;
            padding: 3px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .page-controls button:hover { background: #718096; }
        .page-controls button:disabled { background: #2d3748; color: #718096; cursor: not-allowed; }

        .page-indicator {
            color: white;
            font-size: 0.75rem;
            min-width: 60px;
            text-align: center;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>TechDesk</h1>
        <span class="subject-name" id="subjectName">Subject</span>
        <div style="display:flex; align-items:center; gap:8px;">
            <span id="demoBadge" class="demo-badge" style="display:none;">🧪 DEMO</span>
            <a href="/student">← Back</a>
        </div>
    </nav>

    <div class="split-container">
        <div class="textbook-panel">
            <div class="panel-header">📚 Textbook</div>
            <div class="textbook-content" id="textbookContent">
                <h2 id="textbookTitle">Loading...</h2>
                <p>Textbook content will appear here.</p>
            </div>
        </div>

        <div class="notebook-panel">
            <div class="panel-header">📓 Notebook</div>
            <div class="notebook-toolbar">
                <button class="active" id="penBtn" onclick="setTool('pen')">✏️ Pen</button>
                <button onclick="setTool('eraser')">⬜ Eraser</button>
                <button onclick="clearCanvas()">🗑️</button>
                <button class="color-btn color-blue active" id="btnBlue" onclick="setColor('#1a56db', 'btnBlue')" title="Blue"></button>
                <button class="color-btn color-black" id="btnBlack" onclick="setColor('#111111', 'btnBlack')" title="Black"></button>
                <input type="range" id="sizeSlider" min="1" max="20" value="3" title="Size">
                <button class="save-btn" onclick="saveNotebook()">💾 Save</button>
                <span class="saved-msg" id="savedMsg">Saved!</span>
            </div>
            <div class="notebook-area lined" id="notebookArea">
                <canvas id="notebookCanvas"></canvas>
            </div>
            <div class="page-controls">
                <button id="prevBtn" onclick="changePage(-1)" disabled>◀</button>
                <span class="page-indicator" id="pageIndicator">Page 1 / 20</span>
                <button id="nextBtn" onclick="changePage(1)">▶</button>
            </div>
        </div>
    </div>

    <script src="/js/demo-data.js"></script>
    <script>
        const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
        const BACKEND_BASE_URL = isLocalhost ? 'http://localhost:8080' : 'https://techdesk-backend.onrender.com';
        const socket = io('https://techdesk-frontend.onrender.com');
        const user = JSON.parse(localStorage.getItem('user'));
        const demoData = window.DemoData;
        const DEMO_EGNS = ['9000000001', '9000000002', '9000000003'];
        const isDemo = Boolean(user && user.demo) || DEMO_EGNS.includes(user && user.egn);
        if (!user) window.location.href = '/';

        if (isDemo) document.getElementById('demoBadge').style.display = 'inline';

        const subjectId = localStorage.getItem('currentSubject');
        const canvas = document.getElementById('notebookCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let tool = 'pen';
        let currentColor = '#1a56db';
        let lastX = 0, lastY = 0;
        let currentSubjectName = '';
        let currentPage = 1;
        const MAX_PAGES = 20;

        function resizeCanvas() {
            const area = document.getElementById('notebookArea');
            canvas.width = area.clientWidth;
            canvas.height = area.clientHeight;
        }

        function setColor(color, btnId) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
        }

        function setTool(t) {
            tool = t;
            document.getElementById('penBtn').classList.toggle('active', t === 'pen');
        }

        function updatePageControls() {
            document.getElementById('pageIndicator').textContent = `Page ${currentPage} / ${MAX_PAGES}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === MAX_PAGES;
        }

        function demoKey(subject, page) {
            return `demo_notebook_${user.egn}_${subject}_${page}`;
        }

        function demoSave(silent = false) {
            const imageData = canvas.toDataURL();
            localStorage.setItem(demoKey(currentSubjectName, currentPage), imageData);
            if (!silent) {
                const msg = document.getElementById('savedMsg');
                msg.style.display = 'inline';
                setTimeout(() => msg.style.display = 'none', 2000);
            }
        }

        function demoLoad(subjectName, page) {
            const data = localStorage.getItem(demoKey(subjectName, page));
            if (data && data.startsWith('data:image')) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0);
                img.src = data;
            }
        }

        async function changePage(direction) {
            await saveNotebook(true);
            currentPage += direction;
            updatePageControls();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            await loadPage(currentSubjectName, currentPage);
            if (!isDemo) {
                socket.emit('page-change', {
                    studentEgn: user.egn,
                    subject: currentSubjectName,
                    page: currentPage
                });
            }
        }

        async function loadSubject() {
            try {
                let subject = null;
                if (isDemo && demoData) {
                    subject = demoData.subjects.find(s => String(s.id) === String(subjectId)) || demoData.subjects[0];
                } else {
                    const res = await fetch(`${BACKEND_BASE_URL}/api/subject/${subjectId}`);
                    subject = await res.json();
                }
                currentSubjectName = subject.name;
                document.getElementById('subjectName').textContent = subject.name;
                document.title = `TechDesk - ${subject.name}`;

                const area = document.getElementById('notebookArea');
                const isMaths = subject.name.toLowerCase() === 'maths';
                area.className = 'notebook-area ' + (isMaths ? 'squared' : 'lined');

                const pdfName = subject.name.toLowerCase().replace(/ /g, '-');
                const pdfUrl = `/textbooks/${pdfName}.png`;
                fetch(pdfUrl, { method: 'HEAD' })
                    .then(res => {
                        if (res.ok) {
                            document.getElementById('textbookContent').innerHTML =
                                `<img src="${pdfUrl}" style="width:100%; height:auto;" />`;
                        } else {
                            document.getElementById('textbookContent').innerHTML =
                                `<h2>${subject.name}</h2><p>Textbook content will be added here.</p>`;
                        }
                    });

                resizeCanvas();
                updatePageControls();
                await loadPage(subject.name, currentPage);
            } catch (err) {
                console.error('Could not load subject:', err);
            }
        }

        async function loadPage(subjectName, page) {
            try {
                if (isDemo) {
                    demoLoad(subjectName, page);
                    return;
                }
                const res = await fetch(`${BACKEND_BASE_URL}/api/notebook/student/${user.egn}/${encodeURIComponent(subjectName)}/${page}`);
                if (res.ok) {
                    const notebook = await res.json();
                    if (notebook && notebook.content && notebook.content.startsWith('data:image')) {
                        const img = new Image();
                        img.onload = () => ctx.drawImage(img, 0, 0);
                        img.src = notebook.content;
                    }
                }
            } catch (err) {
                console.error('Could not load page:', err);
            }
        }

        function draw(x0, y0, x1, y1) {
            const strokeData = {
                x0, y0, x1, y1,
                color: tool === 'eraser' ? null : currentColor,
                size: document.getElementById('sizeSlider').value,
                tool,
                studentEgn: user.egn,
                subject: currentSubjectName,
                page: currentPage
            };

            if (tool === 'eraser') {
                ctx.clearRect(x1 - 15, y1 - 15, 30, 30);
            } else {
                ctx.beginPath();
                ctx.moveTo(x0, y0);
                ctx.lineTo(x1, y1);
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = document.getElementById('sizeSlider').value;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            }

            if (!isDemo) {
                socket.emit('draw-stroke', strokeData);
            }
            scheduleAutoSave();
        }

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            draw(lastX, lastY, e.offsetX, e.offsetY);
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mouseout', () => drawing = false);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            drawing = true;
            lastX = touch.clientX - rect.left;
            lastY = touch.clientY - rect.top;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!drawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            draw(lastX, lastY, x, y);
            [lastX, lastY] = [x, y];
        }, { passive: false });

        canvas.addEventListener('touchend', () => drawing = false);
        canvas.addEventListener('touchcancel', () => drawing = false);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (!isDemo) {
                socket.emit('clear-canvas', { studentEgn: user.egn, subject: currentSubjectName, page: currentPage });
            }
            scheduleAutoSave();
        }

        let autosaveTimer = null;

        function scheduleAutoSave() {
            if (autosaveTimer) clearTimeout(autosaveTimer);
            autosaveTimer = setTimeout(() => saveNotebook(true), 800);
        }

        async function saveNotebook(silent = false) {
            if (isDemo) {
                demoSave(silent);
                return;
            }
            const imageData = canvas.toDataURL();
            try {
                await fetch(`${BACKEND_BASE_URL}/api/notebook/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        studentEgn: user.egn,
                        subject: currentSubjectName,
                        schoolYear: '2025-2026',
                        format: 'A4',
                        style: 'lined',
                        color: currentColor,
                        content: imageData,
                        pageNumber: currentPage
                    })
                });
                if (!silent) {
                    const msg = document.getElementById('savedMsg');
                    msg.style.display = 'inline';
                    setTimeout(() => msg.style.display = 'none', 2000);
                }
            } catch (err) {
                console.error('Could not save:', err);
            }
        }

        window.addEventListener('resize', resizeCanvas);
        loadSubject();
    </script>
</body>
</html>
