<script src="/js/demo-data.js"></script>
<script>
    const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
    const BACKEND_BASE_URL = isLocalhost ? 'http://localhost:8080' : 'https://techdesk-backend.onrender.com';
    const socket = io('https://techdesk-frontend.onrender.com');
    const user = JSON.parse(localStorage.getItem('user'));
    const demoData = window.DemoData;
    const DEMO_EGNS = ['9000000001', '9000000002', '9000000003'];
    const isDemo = Boolean(user && user.demo) || DEMO_EGNS.includes(user && user.egn);
    if (!user) window.location.href = '/';

    if (isDemo) document.getElementById('demoBadge').style.display = 'inline';

    const subjectId = localStorage.getItem('currentSubject');
    const canvas = document.getElementById('notebookCanvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    let tool = 'pen';
    let currentColor = '#1a56db';
    let lastX = 0, lastY = 0;
    let currentSubjectName = '';
    let currentPage = 1;
    const MAX_PAGES = 20;

    function resizeCanvas() {
        const area = document.getElementById('notebookArea');
        canvas.width = area.clientWidth;
        canvas.height = area.clientHeight;
    }

    function setColor(color, btnId) {
        currentColor = color;
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
    }

    function setTool(t) {
        tool = t;
        document.getElementById('penBtn').classList.toggle('active', t === 'pen');
    }

    function updatePageControls() {
        document.getElementById('pageIndicator').textContent = `Page ${currentPage} / ${MAX_PAGES}`;
        document.getElementById('prevBtn').disabled = currentPage === 1;
        document.getElementById('nextBtn').disabled = currentPage === MAX_PAGES;
    }

    function demoKey(subject, page) {
        return `demo_notebook_${user.egn}_${subject}_${page}`;
    }

    function demoSave(silent = false) {
        const imageData = canvas.toDataURL();
        localStorage.setItem(demoKey(currentSubjectName, currentPage), imageData);
        if (!silent) {
            const msg = document.getElementById('savedMsg');
            msg.style.display = 'inline';
            setTimeout(() => msg.style.display = 'none', 2000);
        }
    }

    function demoLoad(subjectName, page) {
        const data = localStorage.getItem(demoKey(subjectName, page));
        if (data && data.startsWith('data:image')) {
            const img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = data;
        }
    }

    async function changePage(direction) {
        await saveNotebook(true);
        currentPage += direction;
        updatePageControls();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        await loadPage(currentSubjectName, currentPage);
        if (!isDemo) {
            socket.emit('page-change', {
                studentEgn: user.egn,
                subject: currentSubjectName,
                page: currentPage
            });
        }
    }

    async function loadSubject() {
        try {
            let subject = null;
            if (isDemo && demoData) {
                subject = demoData.subjects.find(s => String(s.id) === String(subjectId)) || demoData.subjects[0];
            } else {
                const res = await fetch(`${BACKEND_BASE_URL}/api/subject/${subjectId}`);
                subject = await res.json();
            }
            currentSubjectName = subject.name;
            document.getElementById('subjectName').textContent = subject.name;
            document.title = `TechDesk - ${subject.name}`;

            const area = document.getElementById('notebookArea');
            const isMaths = subject.name.toLowerCase() === 'maths';
            area.className = 'notebook-area ' + (isMaths ? 'squared' : 'lined');

            const pdfName = subject.name.toLowerCase().replace(/ /g, '-');
            const pdfUrl = `/textbooks/${pdfName}.png`;
            fetch(pdfUrl, { method: 'HEAD' })
                .then(res => {
                    if (res.ok) {
                        document.getElementById('textbookContent').innerHTML =
                            `<img src="${pdfUrl}" style="width:100%; height:auto;" />`;
                    } else {
                        document.getElementById('textbookContent').innerHTML =
                            `<h2>${subject.name}</h2><p>Textbook content will be added here.</p>`;
                    }
                });

            resizeCanvas();
            updatePageControls();
            await loadPage(subject.name, currentPage);
        } catch (err) {
            console.error('Could not load subject:', err);
        }
    }

    async function loadPage(subjectName, page) {
        try {
            if (isDemo) {
                demoLoad(subjectName, page);
                return;
            }
            const res = await fetch(`${BACKEND_BASE_URL}/api/notebook/student/${user.egn}/${encodeURIComponent(subjectName)}/${page}`);
            if (res.ok) {
                const notebook = await res.json();
                if (notebook && notebook.content && notebook.content.startsWith('data:image')) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0);
                    img.src = notebook.content;
                }
            }
        } catch (err) {
            console.error('Could not load page:', err);
        }
    }

    function draw(x0, y0, x1, y1) {
        const strokeData = {
            x0, y0, x1, y1,
            color: tool === 'eraser' ? null : currentColor,
            size: document.getElementById('sizeSlider').value,
            tool,
            studentEgn: user.egn,
            subject: currentSubjectName,
            page: currentPage
        };

        if (tool === 'eraser') {
            ctx.clearRect(x1 - 15, y1 - 15, 30, 30);
        } else {
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(x1, y1);
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = document.getElementById('sizeSlider').value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        if (!isDemo) {
            socket.emit('draw-stroke', strokeData);
        }
        scheduleAutoSave();
    }

    canvas.addEventListener('mousedown', (e) => {
        drawing = true;
        [lastX, lastY] = [e.offsetX, e.offsetY];
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!drawing) return;
        draw(lastX, lastY, e.offsetX, e.offsetY);
        [lastX, lastY] = [e.offsetX, e.offsetY];
    });

    canvas.addEventListener('mouseup', () => drawing = false);
    canvas.addEventListener('mouseout', () => drawing = false);

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        drawing = true;
        lastX = touch.clientX - rect.left;
        lastY = touch.clientY - rect.top;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!drawing) return;
        const touch = e.touches[0];
        const rect = canvas.getBoundingClientRect();
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        draw(lastX, lastY, x, y);
        [lastX, lastY] = [x, y];
    }, { passive: false });

    canvas.addEventListener('touchend', () => drawing = false);
    canvas.addEventListener('touchcancel', () => drawing = false);

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!isDemo) {
            socket.emit('clear-canvas', { studentEgn: user.egn, subject: currentSubjectName, page: currentPage });
        }
        scheduleAutoSave();
    }

    let autosaveTimer = null;

    function scheduleAutoSave() {
        if (autosaveTimer) clearTimeout(autosaveTimer);
        autosaveTimer = setTimeout(() => saveNotebook(true), 800);
    }

    async function saveNotebook(silent = false) {
        if (isDemo) {
            demoSave(silent);
            return;
        }
        const imageData = canvas.toDataURL();
        try {
            await fetch(`${BACKEND_BASE_URL}/api/notebook/save`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    studentEgn: user.egn,
                    subject: currentSubjectName,
                    schoolYear: '2025-2026',
                    format: 'A4',
                    style: 'lined',
                    color: currentColor,
                    content: imageData,
                    pageNumber: currentPage
                })
            });
            if (!silent) {
                const msg = document.getElementById('savedMsg');
                msg.style.display = 'inline';
                setTimeout(() => msg.style.display = 'none', 2000);
            }
        } catch (err) {
            console.error('Could not save:', err);
        }
    }

    window.addEventListener('resize', resizeCanvas);
    loadSubject();
</script>
