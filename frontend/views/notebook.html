<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TechDesk - Notebook</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: #ffffff;
            color: #1d2433;
        }
        body.easy-read {
            font-family: "Verdana", "Tahoma", sans-serif;
            letter-spacing: 0.02em;
        }
        body.calm-mode .textbook-panel {
            display: none;
        }

        .navbar {
            background: #ffffff;
            color: #1f2937;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 48px;
            border-bottom: 1px solid #e5e7eb;
        }

        .navbar h1 { font-size: 1rem; }
        .navbar .subject-name {
            font-size: 0.78rem;
            color: #4b5563;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .navbar a {
            color: #1f2937;
            text-decoration: none;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            background: #ffffff;
        }

        .split-container {
            display: grid;
            grid-template-columns: minmax(260px, 38%) 1fr;
            gap: 12px;
            padding: 12px;
            height: calc(100vh - 48px);
            background: #ffffff;
        }

        .panel {
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            box-shadow: none;
            background: #fff;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel-header {
            background: #ffffff;
            color: #1f2937;
            padding: 8px 12px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            border-bottom: 1px solid #e5e7eb;
        }

        .textbook-content {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            font-size: 0.82rem;
            line-height: 1.55;
            background: #ffffff;
        }

        .notebook-toolbar {
            background: #ffffff;
            padding: 6px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            border-bottom: 1px solid #e5e7eb;
        }

        .notebook-toolbar button {
            border: none;
            border-radius: 8px;
            padding: 5px 8px;
            color: #1f2937;
            background: #f3f4f6;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .notebook-toolbar button.active {
            background: #e5e7eb;
            outline: 1px solid #d1d5db;
        }
        .assist-btn {
            background: #eef6ff !important;
            color: #1d4b8f !important;
            border: 1px solid #cfe1ff !important;
        }

        .color-btn {
            width: 18px;
            height: 18px;
            border-radius: 50% !important;
            border: 2px solid transparent !important;
            padding: 0 !important;
        }

        .color-btn.active {
            border-color: #fff !important;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.55);
        }

        .color-blue { background: #1a56db !important; }
        .color-black { background: #111111 !important; }

        #sizeSlider { width: 60px; }

        .save-btn { margin-left: auto; background: #2f9a62 !important; }
        .add-page-btn { background: #7256d8 !important; }

        .saved-msg {
            color: #ccffdc;
            font-size: 0.73rem;
            display: none;
        }

        .notebook-area {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #ffffff;
        }

        .paper {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .focus-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 34px;
            border-top: 1px solid rgba(44, 126, 255, 0.45);
            border-bottom: 1px solid rgba(44, 126, 255, 0.45);
            background: rgba(199, 223, 255, 0.13);
            z-index: 1;
            display: none;
            pointer-events: none;
        }
        .focus-line.active {
            display: block;
        }

        .paper.lined {
            background-image: linear-gradient(#c7d9f4 1px, transparent 1px);
            background-size: 100% 28px;
            background-position: 0 27px;
        }

        .paper.squared {
            background-image:
                linear-gradient(#c7d9f4 1px, transparent 1px),
                linear-gradient(90deg, #c7d9f4 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .paper.dotted {
            background-image: radial-gradient(circle, #bfd0ec 1px, transparent 1px);
            background-size: 20px 20px;
        }

        canvas {
            position: absolute;
            inset: 0;
            display: block;
            z-index: 2;
            touch-action: none;
        }

        .page-controls {
            background: #ffffff;
            color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 7px;
            font-size: 0.78rem;
            border-top: 1px solid #e5e7eb;
        }

        .page-controls button {
            border: none;
            border-radius: 8px;
            padding: 5px 10px;
            color: #1f2937;
            background: #f3f4f6;
            cursor: pointer;
        }

        .page-controls button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        @media (max-width: 900px) {
            .split-container { grid-template-columns: 1fr; }
            .textbook-panel { display: none; }
        }
    </style>
</head>
<body class="no-ambient">
    <nav class="navbar">
        <h1>TechDesk</h1>
        <span class="subject-name" id="subjectName">Subject</span>
        <div style="display:flex; align-items:center; gap:8px;">
            <span id="demoBadge" style="display:none; font-size:0.67rem; background:#deaf21; color:#fff; padding:2px 6px; border-radius:8px;">DEMO</span>
            <a href="/student">← Back</a>
        </div>
    </nav>

    <div class="split-container">
        <div class="panel textbook-panel">
            <div class="panel-header">Textbook</div>
            <div class="textbook-content" id="textbookContent">
                <h2 id="textbookTitle">Loading...</h2>
                <p>Textbook content will appear here.</p>
            </div>
        </div>

        <div class="panel notebook-panel">
            <div class="panel-header">Notebook</div>
            <div class="notebook-toolbar">
                <button class="active" id="penBtn" onclick="setTool('pen')">Pen</button>
                <button onclick="setTool('eraser')">Eraser</button>
                <button onclick="clearCanvas()">Clear</button>
                <button class="color-btn color-blue active" id="btnBlue" onclick="setColor('#1a56db', 'btnBlue')" title="Blue"></button>
                <button class="color-btn color-black" id="btnBlack" onclick="setColor('#111111', 'btnBlack')" title="Black"></button>
                <input type="range" id="sizeSlider" min="1" max="20" value="3" title="Size">
                <button class="assist-btn" id="focusBtn" onclick="toggleFocusMode()">Focus</button>
                <button class="assist-btn" id="easyReadBtn" onclick="toggleEasyRead()">Easy Read</button>
                <button class="assist-btn" id="readAloudBtn" onclick="readTextbookAloud()">Read Aloud</button>
                <button class="add-page-btn" onclick="addPage()">+ Page</button>
                <button class="save-btn" onclick="saveNotebook()">Save</button>
                <span class="saved-msg" id="savedMsg">Saved</span>
            </div>

            <div class="notebook-area" id="notebookArea">
                <div class="paper lined" id="paperLayer"></div>
                <div class="focus-line" id="focusLine"></div>
                <canvas id="notebookCanvas"></canvas>
            </div>

            <div class="page-controls">
                <button id="prevBtn" onclick="changePage(-1)">◀</button>
                <span id="pageIndicator">Page 1 / 1</span>
                <button id="nextBtn" onclick="changePage(1)">▶</button>
            </div>
        </div>
    </div>

    <script src="/js/demo-data.js"></script>
    <script src="/js/feedback.js"></script>
    <script>
        const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
        const BACKEND_BASE_URL = isLocalhost ? 'http://localhost:8080' : 'https://techdesk-backend.onrender.com';
        const socket = io('https://techdesk-frontend.onrender.com');
        const user = JSON.parse(localStorage.getItem('user'));
        const demoData = window.DemoData;
        const DEMO_EGNS = ['9000000001', '9000000002', '9000000003'];
        const isDemo = Boolean(user && user.demo) || DEMO_EGNS.includes(user && user.egn);

        if (!user) window.location.href = '/';
        if (isDemo) document.getElementById('demoBadge').style.display = 'inline';

        let subjectId = localStorage.getItem('currentSubject');
        const canvas = document.getElementById('notebookCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let tool = 'pen';
        let currentColor = '#1a56db';
        let lastX = 0, lastY = 0;
        let currentSubjectName = '';
        let currentPage = 1;
        let maxPage = 1;
        let currentStyle = 'lined';
        let notebookDirty = false;
        let saveInFlight = null;
        let focusMode = false;
        const token = localStorage.getItem('token');
        let typingTimeout = null;

        function authHeaders(extra = {}) {
            const headers = token ? { ...extra, Authorization: `Bearer ${token}` } : { ...extra };
            if (user?.email) headers['X-User-Email'] = user.email;
            if (user?.egn) headers['X-User-Egn'] = user.egn;
            return headers;
        }

        function deriveNameFromEmail(email) {
            if (!email) return 'Student';
            const local = String(email).split('@')[0] || '';
            const cleaned = local
                .replace(/[-_.]+/g, ' ')
                .replace(/\b(student|teacher|parent|admin)\b/gi, ' ')
                .replace(/\s+/g, ' ')
                .trim();
            if (!cleaned) return 'Student';
            return cleaned
                .split(' ')
                .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
                .join(' ');
        }

        function getNotebookStudentName() {
            return user?.displayName || deriveNameFromEmail(user?.email) || 'Student';
        }

        function emitNotebookTyping(state = 'active') {
            if (!currentSubjectName || !user?.egn) return;
            socket.emit('notebook-typing', {
                studentName: getNotebookStudentName(),
                studentEgn: user.egn,
                className: user?.className || null,
                subject: currentSubjectName,
                page: currentPage,
                state,
                authorRole: user.role || 'STUDENT',
                updatedAt: Date.now()
            });
        }

        function markNotebookInteraction() {
            emitNotebookTyping('active');
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => emitNotebookTyping('inactive'), 4500);
        }

        function resizeCanvas() {
            const area = document.getElementById('notebookArea');
            canvas.width = area.clientWidth;
            canvas.height = area.clientHeight;
        }

        function setPaperStyle(style) {
            currentStyle = ['lined', 'squared', 'dotted'].includes(style) ? style : 'lined';
            const paper = document.getElementById('paperLayer');
            paper.className = `paper ${currentStyle}`;
        }

        function setColor(color, btnId) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
        }

        function setTool(t) {
            tool = t;
            document.getElementById('penBtn').classList.toggle('active', t === 'pen');
        }

        function toggleFocusMode() {
            focusMode = !focusMode;
            document.getElementById('focusLine')?.classList.toggle('active', focusMode);
            document.getElementById('focusBtn')?.classList.toggle('active', focusMode);
        }

        function toggleEasyRead() {
            document.body.classList.toggle('easy-read');
            document.body.classList.toggle('calm-mode');
            document.getElementById('easyReadBtn')?.classList.toggle('active');
        }

        function readTextbookAloud() {
            const content = document.getElementById('textbookContent');
            if (!content || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(content.innerText.slice(0, 1200));
            utterance.rate = 0.95;
            utterance.pitch = 1.0;
            window.speechSynthesis.speak(utterance);
        }

        function updatePageControls() {
            document.getElementById('pageIndicator').textContent = `Page ${currentPage} / ${maxPage}`;
            document.getElementById('prevBtn').disabled = currentPage <= 1;
            document.getElementById('nextBtn').disabled = currentPage >= maxPage;
        }

        function subjectMatch(a, b) {
            return a && b && a.trim().toLowerCase() === b.trim().toLowerCase();
        }

        async function fetchPages() {
            if (isDemo) {
                maxPage = 5;
                return;
            }
            try {
                const res = await fetch(`${BACKEND_BASE_URL}/api/notebook/pages/${user.egn}/${encodeURIComponent(currentSubjectName)}`, {
                    headers: authHeaders()
                });
                const pages = res.ok ? await res.json() : [];
                maxPage = Math.max(1, ...(pages || [1]));
            } catch {
                maxPage = Math.max(maxPage, 1);
            }
        }

        async function changePage(direction) {
            const target = currentPage + direction;
            if (target < 1 || target > maxPage) return;
            await saveNotebook(true);
            currentPage = target;
            updatePageControls();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            await loadPage(currentSubjectName, currentPage);
            localStorage.setItem('currentNotebookPage', String(currentPage));
            socket.emit('page-change', {
                studentName: getNotebookStudentName(),
                subject: currentSubjectName,
                page: currentPage,
                authorRole: user.role || 'STUDENT'
            });
            markNotebookInteraction();
        }

        async function addPage() {
            await saveNotebook(true);
            maxPage += 1;
            currentPage = maxPage;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updatePageControls();
            socket.emit('page-change', {
                studentName: getNotebookStudentName(),
                subject: currentSubjectName,
                page: currentPage,
                authorRole: user.role || 'STUDENT'
            });
            markNotebookInteraction();
        }

        function renderTextbookFallback(subjectName) {
            const demoBook = demoData?.textbooks?.[subjectName];
            if (demoBook) {
                const sections = demoBook.sections.map(section => `
                    <h3>${section.heading}</h3>
                    <p>${section.body}</p>
                `).join('');
                document.getElementById('textbookContent').innerHTML = `
                    <h2>${demoBook.title}</h2>
                    ${sections}
                `;
                return;
            }
            document.getElementById('textbookContent').innerHTML =
                `<h2>${subjectName}</h2><p>Sample textbook content will appear here.</p>`;
        }

        function loadTextbookVisual(subjectName) {
            const pdfName = subjectName.toLowerCase().replace(/ /g, '-');
            const svgUrl = `/textbooks/${pdfName}.svg`;
            const pngUrl = `/textbooks/${pdfName}.png`;
            fetch(svgUrl, { method: 'HEAD' })
                .then(res => {
                    if (res.ok) {
                        document.getElementById('textbookContent').innerHTML =
                            `<img src="${svgUrl}" style="width:100%; height:auto;" alt="${subjectName} textbook" />`;
                        return;
                    }
                    return fetch(pngUrl, { method: 'HEAD' })
                        .then(pngRes => {
                            if (pngRes.ok) {
                                document.getElementById('textbookContent').innerHTML =
                                    `<img src="${pngUrl}" style="width:100%; height:auto;" alt="${subjectName} textbook" />`;
                            } else {
                                renderTextbookFallback(subjectName);
                            }
                        });
                })
                .catch(() => renderTextbookFallback(subjectName));
        }

        async function loadSettings() {
            if (isDemo) {
                setPaperStyle('lined');
                return;
            }
            try {
                const res = await fetch(`${BACKEND_BASE_URL}/api/notebook/settings/${user.egn}/${encodeURIComponent(currentSubjectName)}`, {
                    headers: authHeaders()
                });
                const data = res.ok ? await res.json() : { style: 'lined' };
                setPaperStyle(data.style || 'lined');
            } catch {
                setPaperStyle('lined');
            }
        }

        async function loadSubject() {
            try {
                let subject = null;
                if (isDemo && demoData) {
                    subject = demoData.subjects.find(s => String(s.id) === String(subjectId)) || demoData.subjects[0];
                } else {
                    if (!subjectId) {
                        const allRes = await fetch(`${BACKEND_BASE_URL}/api/subject/all`, { headers: authHeaders() });
                        const allSubjects = allRes.ok ? await allRes.json() : [];
                        if (!allSubjects.length) throw new Error('No subjects found');
                        subjectId = String(allSubjects[0].id);
                        localStorage.setItem('currentSubject', subjectId);
                    }

                    let res = await fetch(`${BACKEND_BASE_URL}/api/subject/${subjectId}`, { headers: authHeaders() });
                    if (!res.ok) {
                        const allRes = await fetch(`${BACKEND_BASE_URL}/api/subject/all`, { headers: authHeaders() });
                        const allSubjects = allRes.ok ? await allRes.json() : [];
                        if (!allSubjects.length) throw new Error('No subjects found');
                        subjectId = String(allSubjects[0].id);
                        localStorage.setItem('currentSubject', subjectId);
                        res = await fetch(`${BACKEND_BASE_URL}/api/subject/${subjectId}`, { headers: authHeaders() });
                    }
                    if (!res.ok) throw new Error('Could not load subject');
                    subject = await res.json();
                }

                currentSubjectName = subject.name;
                document.getElementById('subjectName').textContent = subject.name;
                document.title = `TechDesk - ${subject.name}`;
                localStorage.setItem('currentNotebookSubject', subject.name);

                loadTextbookVisual(subject.name);
                await loadSettings();
                await fetchPages();
                const rememberedPage = parseInt(localStorage.getItem('currentNotebookPage') || '1', 10);
                currentPage = Math.min(Math.max(1, rememberedPage), maxPage);

                resizeCanvas();
                updatePageControls();
                await loadPage(subject.name, currentPage);
            } catch (err) {
                console.error('Could not load subject:', err);
            }
        }

        async function loadPage(subjectName, page) {
            try {
                if (isDemo) return;
                const res = await fetch(`${BACKEND_BASE_URL}/api/notebook/student/${user.egn}/${encodeURIComponent(subjectName)}/${page}`, {
                    headers: authHeaders()
                });
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                if (!res.ok) return;
                const notebook = await res.json();
                if (notebook?.style) setPaperStyle(notebook.style);
                if (notebook && notebook.content && notebook.content.startsWith('data:image')) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    img.src = notebook.content;
                }
            } catch (err) {
                console.error('Could not load page:', err);
            }
        }

        function draw(x0, y0, x1, y1) {
            const strokeData = {
                x0, y0, x1, y1,
                color: tool === 'eraser' ? null : currentColor,
                size: document.getElementById('sizeSlider').value,
                tool,
                studentName: getNotebookStudentName(),
                studentEgn: user.egn,
                subject: currentSubjectName,
                page: currentPage,
                authorRole: user.role || 'STUDENT'
            };

            if (tool === 'eraser') {
                ctx.clearRect(x1 - 15, y1 - 15, 30, 30);
            } else {
                ctx.beginPath();
                ctx.moveTo(x0, y0);
                ctx.lineTo(x1, y1);
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = document.getElementById('sizeSlider').value;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            }

            socket.emit('draw-stroke', strokeData);
            markNotebookInteraction();
            notebookDirty = true;
            scheduleAutoSave();
        }

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            draw(lastX, lastY, e.offsetX, e.offsetY);
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mouseout', () => drawing = false);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            drawing = true;
            lastX = touch.clientX - rect.left;
            lastY = touch.clientY - rect.top;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!drawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            draw(lastX, lastY, x, y);
            [lastX, lastY] = [x, y];
        }, { passive: false });

        canvas.addEventListener('touchend', () => drawing = false);
        canvas.addEventListener('touchcancel', () => drawing = false);
        canvas.addEventListener('pointermove', (e) => {
            if (!focusMode) return;
            const line = document.getElementById('focusLine');
            if (!line) return;
            line.style.top = `${Math.max(0, e.offsetY - 17)}px`;
        });

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            socket.emit('clear-canvas', {
                studentName: getNotebookStudentName(),
                subject: currentSubjectName,
                page: currentPage,
                authorRole: user.role || 'STUDENT'
            });
            markNotebookInteraction();
            notebookDirty = true;
            scheduleAutoSave();
        }

        let autosaveTimer = null;

        function scheduleAutoSave() {
            if (autosaveTimer) clearTimeout(autosaveTimer);
            autosaveTimer = setTimeout(() => saveNotebook(true), 700);
        }

        function getCanvasPayload() {
            const webp = canvas.toDataURL('image/webp', 0.68);
            if (webp && webp.length < 7 * 1024 * 1024) return webp;
            return canvas.toDataURL('image/jpeg', 0.58);
        }

        function showSaveStatus(text, timeoutMs = 1600) {
            const msg = document.getElementById('savedMsg');
            if (!msg) return;
            msg.textContent = text;
            msg.style.display = 'inline';
            setTimeout(() => {
                msg.style.display = 'none';
                msg.textContent = 'Saved';
            }, timeoutMs);
        }

        async function saveNotebook(silent = false) {
            if (isDemo || !currentSubjectName) return;
            if (!notebookDirty && silent) return;
            if (autosaveTimer) {
                clearTimeout(autosaveTimer);
                autosaveTimer = null;
            }
            let imageData = getCanvasPayload();
            try {
                let request = fetch(`${BACKEND_BASE_URL}/api/notebook/save`, {
                    method: 'POST',
                    headers: authHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify({
                        studentEgn: user.egn,
                        subject: currentSubjectName,
                        schoolYear: '2025-2026',
                        format: 'A4',
                        style: currentStyle,
                        color: currentColor,
                        content: imageData,
                        pageNumber: currentPage
                    })
                });
                saveInFlight = request;
                let res = await request;
                if (!res.ok) {
                    // Retry once with lower-quality payload for unstable mobile/network conditions.
                    imageData = canvas.toDataURL('image/jpeg', 0.46);
                    request = fetch(`${BACKEND_BASE_URL}/api/notebook/save`, {
                        method: 'POST',
                        headers: authHeaders({ 'Content-Type': 'application/json' }),
                        body: JSON.stringify({
                            studentEgn: user.egn,
                            subject: currentSubjectName,
                            schoolYear: '2025-2026',
                            format: 'A4',
                            style: currentStyle,
                            color: currentColor,
                            content: imageData,
                            pageNumber: currentPage
                        })
                    });
                    saveInFlight = request;
                    res = await request;
                }
                if (!res.ok) throw new Error(`Save failed ${res.status}`);
                saveInFlight = null;
                notebookDirty = false;
                maxPage = Math.max(maxPage, currentPage);
                updatePageControls();
                showSaveStatus(silent ? 'Auto-saved' : 'Saved');
            } catch (err) {
                console.error('Could not save:', err);
                showSaveStatus('Save failed', 2200);
            }
        }

        function saveNotebookKeepalive() {
            if (isDemo || !notebookDirty || !currentSubjectName) return;
            const imageData = getCanvasPayload();
            fetch(`${BACKEND_BASE_URL}/api/notebook/save`, {
                method: 'POST',
                keepalive: true,
                headers: authHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify({
                    studentEgn: user.egn,
                    subject: currentSubjectName,
                    schoolYear: '2025-2026',
                    format: 'A4',
                    style: currentStyle,
                    color: currentColor,
                    content: imageData,
                    pageNumber: currentPage
                })
            }).catch(() => {});
        }

        window.addEventListener('resize', () => {
            const snapshot = canvas.toDataURL();
            resizeCanvas();
            if (snapshot && snapshot.startsWith('data:image')) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                img.src = snapshot;
            }
        });

        loadSubject();
        emitNotebookTyping('active');
        setInterval(() => {
            emitNotebookTyping(document.hidden ? 'inactive' : 'active');
        }, 15000);

        window.addEventListener('beforeunload', () => {
            saveNotebookKeepalive();
            emitNotebookTyping('inactive');
        });
        window.addEventListener('pagehide', () => {
            saveNotebookKeepalive();
            emitNotebookTyping('inactive');
        });
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) saveNotebookKeepalive();
            emitNotebookTyping(document.hidden ? 'inactive' : 'active');
        });

        socket.on('draw-stroke', (data) => {
            if (!data) return;
            if (data.studentName !== getNotebookStudentName()) return;
            if (!subjectMatch(data.subject, currentSubjectName)) return;
            if (parseInt(data.page, 10) !== parseInt(currentPage, 10)) return;
            if (data.tool === 'eraser') {
                ctx.clearRect(data.x1 - 10, data.y1 - 10, 20, 20);
            } else {
                ctx.beginPath();
                ctx.moveTo(data.x0, data.y0);
                ctx.lineTo(data.x1, data.y1);
                ctx.strokeStyle = data.color || '#111111';
                ctx.lineWidth = data.size || 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            }
        });

        socket.on('clear-canvas', (data) => {
            if (!data) return;
            if (data.studentName !== getNotebookStudentName()) return;
            if (!subjectMatch(data.subject, currentSubjectName)) return;
            if (parseInt(data.page, 10) !== parseInt(currentPage, 10)) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        socket.on('page-change', (data) => {
            if (!data) return;
            if (data.studentName !== getNotebookStudentName()) return;
            if (!subjectMatch(data.subject, currentSubjectName)) return;
            currentPage = parseInt(data.page, 10);
            maxPage = Math.max(maxPage, currentPage);
            updatePageControls();
            loadPage(currentSubjectName, currentPage);
        });
    </script>
</body>
</html>
