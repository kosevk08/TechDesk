<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TechDesk - Notebook</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="/css/shared.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }

        .navbar {
            background: #1a1a2e;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
        }

        .navbar h1 { font-size: 1.2rem; }
        .navbar .subject-name { font-size: 1rem; color: #a0aec0; }
        .navbar a { color: #a0aec0; text-decoration: none; font-size: 0.9rem; }
        .navbar a:hover { color: white; }

        .split-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .textbook-panel {
            width: 50%;
            background: #f8f9fa;
            border-right: 3px solid #1a1a2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            background: #1a1a2e;
            color: white;
            padding: 8px 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .textbook-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 0.95rem;
            line-height: 1.7;
            color: #2d3748;
        }

        .textbook-content h2 { margin-bottom: 15px; color: #1a1a2e; }
        .textbook-content h3 { margin: 15px 0 8px; color: #2d3748; }
        .textbook-content p { margin-bottom: 12px; }

        .notebook-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .notebook-toolbar {
            background: #2d3748;
            padding: 6px 15px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .notebook-toolbar button {
            background: #4a5568;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .notebook-toolbar button:hover { background: #718096; }
        .notebook-toolbar button.active { background: #3182ce; }

        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50% !important;
            border: 3px solid transparent !important;
            padding: 0 !important;
            cursor: pointer;
        }

        .color-btn.active {
            border: 3px solid white !important;
            outline: 2px solid #a0aec0;
        }

        .color-blue { background: #1a56db !important; }
        .color-black { background: #111111 !important; }

        .notebook-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .squared {
            background-color: white;
            background-image:
                linear-gradient(#b0c4de 1px, transparent 1px),
                linear-gradient(90deg, #b0c4de 1px, transparent 1px);
            background-size: 25px 25px;
        }

        .lined {
            background-color: white;
            background-image: linear-gradient(#b0c4de 1px, transparent 1px);
            background-size: 100% 28px;
            background-position: 0 27px;
        }

        canvas {
            display: block;
            cursor: crosshair;
            touch-action: none;
        }

        .save-btn {
            background: #38a169 !important;
            color: white;
            border: none;
            padding: 4px 12px !important;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-left: auto;
        }

        .save-btn:hover { background: #2f855a !important; }

        .saved-msg {
            color: #68d391;
            font-size: 0.8rem;
            display: none;
        }

        .page-controls {
            background: #1a1a2e;
            padding: 6px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .page-controls button {
            background: #4a5568;
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .page-controls button:hover { background: #718096; }
        .page-controls button:disabled { background: #2d3748; color: #718096; cursor: not-allowed; }

        .page-indicator {
            color: white;
            font-size: 0.85rem;
            min-width: 80px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .textbook-panel { display: none; }
            .notebook-panel { width: 100%; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>TechDesk</h1>
        <span class="subject-name" id="subjectName">Subject</span>
        <a href="/student">← Back</a>
    </nav>

    <div class="split-container">
        <div class="textbook-panel">
            <div class="panel-header">📚 Textbook</div>
            <div class="textbook-content" id="textbookContent">
                <h2 id="textbookTitle">Loading...</h2>
                <p>Textbook content will appear here.</p>
            </div>
        </div>

        <div class="notebook-panel">
            <div class="panel-header">📓 Notebook</div>
            <div class="notebook-toolbar">
                <button class="active" id="penBtn" onclick="setTool('pen')">✏️ Pen</button>
                <button onclick="setTool('eraser')">⬜ Eraser</button>
                <button onclick="clearCanvas()">🗑️ Clear</button>
                <button class="color-btn color-blue active" id="btnBlue" onclick="setColor('#1a56db', 'btnBlue')" title="Blue"></button>
                <button class="color-btn color-black" id="btnBlack" onclick="setColor('#111111', 'btnBlack')" title="Black"></button>
                <input type="range" id="sizeSlider" min="1" max="20" value="3" title="Size">
                <button class="save-btn" onclick="saveNotebook()">💾 Save</button>
                <span class="saved-msg" id="savedMsg">Saved!</span>
            </div>
            <div class="notebook-area lined" id="notebookArea">
                <canvas id="notebookCanvas"></canvas>
            </div>
            <div class="page-controls">
                <button id="prevBtn" onclick="changePage(-1)" disabled>◀ Prev</button>
                <span class="page-indicator" id="pageIndicator">Page 1 / 20</span>
                <button id="nextBtn" onclick="changePage(1)">Next ▶</button>
            </div>
        </div>
    </div>

    <script src="/js/demo-data.js"></script>
    <script src="/js/feedback.js"></script>
    <script>
        const isLocalhost = ['localhost', '127.0.0.1'].includes(window.location.hostname);
        const BACKEND_BASE_URL = isLocalhost ? 'http://localhost:8080' : 'https://techdesk-backend.onrender.com';
        const socket = io();
        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');
        const demoData = window.DemoData;
        const isDemo = Boolean(user && user.demo);
        const authHeaders = (extra = {}) => token ? { ...extra, Authorization: `Bearer ${token}` } : extra;
        if (!user) window.location.href = '/';

        const subjectId = localStorage.getItem('currentSubject');
        const canvas = document.getElementById('notebookCanvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let tool = 'pen';
        let currentColor = '#1a56db';
        let lastX = 0, lastY = 0;
        let currentSubjectName = '';
        let currentPage = 1;
        const MAX_PAGES = 20;

        function resizeCanvas() {
            const area = document.getElementById('notebookArea');
            canvas.width = area.clientWidth;
            canvas.height = area.clientHeight;
        }

        function setColor(color, btnId) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(btnId).classList.add('active');
        }

        function setTool(t) {
            tool = t;
            document.getElementById('penBtn').classList.toggle('active', t === 'pen');
        }

        function updatePageControls() {
            document.getElementById('pageIndicator').textContent = `Page ${currentPage} / ${MAX_PAGES}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === MAX_PAGES;
        }

        function subjectMatch(a, b) {
            return a && b && a.trim().toLowerCase() === b.trim().toLowerCase();
        }

        async function changePage(direction) {
            await saveNotebook(true);
            currentPage += direction;
            updatePageControls();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            await loadPage(currentSubjectName, currentPage);
            localStorage.setItem('currentNotebookPage', String(currentPage));
            socket.emit('page-change', {
                studentName: user.displayName || 'Student',
                subject: currentSubjectName,
                page: currentPage,
                authorRole: user.role || 'STUDENT'
            });
        }

        function renderTextbookFallback(subjectName) {
            const demoBook = demoData?.textbooks?.[subjectName];
            if (demoBook) {
                const sections = demoBook.sections.map(section => `
                    <h3>${section.heading}</h3>
                    <p>${section.body}</p>
                `).join('');
                document.getElementById('textbookContent').innerHTML = `
                    <h2>${demoBook.title}</h2>
                    ${sections}
                `;
                return;
            }
            document.getElementById('textbookContent').innerHTML =
                `<h2>${subjectName}</h2><p>Sample textbook content will appear here.</p>`;
        }

        function loadTextbookVisual(subjectName) {
            const pdfName = subjectName.toLowerCase().replace(/ /g, '-');
            const svgUrl = `/textbooks/${pdfName}.svg`;
            const pngUrl = `/textbooks/${pdfName}.png`;
            fetch(svgUrl, { method: 'HEAD' })
                .then(res => {
                    if (res.ok) {
                        document.getElementById('textbookContent').innerHTML =
                            `<img src="${svgUrl}" style="width:100%; height:auto;" alt="${subjectName} textbook" />`;
                        return;
                    }
                    return fetch(pngUrl, { method: 'HEAD' })
                        .then(pngRes => {
                            if (pngRes.ok) {
                                document.getElementById('textbookContent').innerHTML =
                                    `<img src="${pngUrl}" style="width:100%; height:auto;" alt="${subjectName} textbook" />`;
                            } else {
                                renderTextbookFallback(subjectName);
                            }
                        });
                })
                .catch(() => renderTextbookFallback(subjectName));
        }

        async function loadSubject() {
            try {
                let subject = null;
                if (isDemo && demoData) {
                    subject = demoData.subjects.find(s => String(s.id) === String(subjectId)) || demoData.subjects[0];
                } else {
                    const res = await fetch(`${BACKEND_BASE_URL}/api/subject/${subjectId}`, {
                        headers: authHeaders()
                    });
                    subject = await res.json();
                }
                currentSubjectName = subject.name;
                document.getElementById('subjectName').textContent = subject.name;
                document.title = `TechDesk - ${subject.name}`;
                localStorage.setItem('currentNotebookSubject', subject.name);
                if (user?.className) {
                    localStorage.setItem('currentClassName', user.className);
                }

                const area = document.getElementById('notebookArea');
                const isMaths = subject.name.toLowerCase() === 'maths';
                area.className = 'notebook-area ' + (isMaths ? 'squared' : 'lined');

                loadTextbookVisual(subject.name);

                resizeCanvas();
                updatePageControls();
                localStorage.setItem('currentNotebookPage', String(currentPage));
                await loadPage(subject.name, currentPage);
            } catch (err) {
                console.error('Could not load subject:', err);
            }
        }

        async function loadPage(subjectName, page) {
            try {
                if (isDemo) {
                    const key = `demo-notebook-${user.displayName || 'Student'}-${subjectName}-page-${page}`;
                    const stored = localStorage.getItem(key);
                    if (stored) {
                        const img = new Image();
                        img.onload = () => ctx.drawImage(img, 0, 0);
                        img.src = stored;
                    } else {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#1b1b1b';
                        ctx.font = '18px sans-serif';
                        ctx.fillText('Demo notebook page', 20, 40);
                        ctx.font = '14px sans-serif';
                        ctx.fillText('Draw here to add your own notes.', 20, 70);
                    }
                    return;
                }
                const res = await fetch(`${BACKEND_BASE_URL}/api/notebook/me/${encodeURIComponent(subjectName)}/${page}`, {
                    headers: authHeaders()
                });
                if (res.ok) {
                    const notebook = await res.json();
                    if (notebook && notebook.content && notebook.content.startsWith('data:image')) {
                        const img = new Image();
                        img.onload = () => ctx.drawImage(img, 0, 0);
                        img.src = notebook.content;
                    }
                }
            } catch (err) {
                console.error('Could not load page:', err);
            }
        }

        function draw(x0, y0, x1, y1) {
            const strokeData = {
                x0, y0, x1, y1,
                color: tool === 'eraser' ? null : currentColor,
                size: document.getElementById('sizeSlider').value,
                tool,
                studentName: user.displayName || 'Student',
                subject: currentSubjectName,
                page: currentPage,
                authorRole: user.role || 'STUDENT'
            };

            if (tool === 'eraser') {
                ctx.clearRect(x1 - 15, y1 - 15, 30, 30);
            } else {
                ctx.beginPath();
                ctx.moveTo(x0, y0);
                ctx.lineTo(x1, y1);
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = document.getElementById('sizeSlider').value;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            }

            socket.emit('draw-stroke', strokeData);
            scheduleAutoSave();
        }

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            draw(lastX, lastY, e.offsetX, e.offsetY);
            [lastX, lastY] = [e.offsetX, e.offsetY];
        });

        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mouseout', () => drawing = false);

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            drawing = true;
            lastX = touch.clientX - rect.left;
            lastY = touch.clientY - rect.top;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!drawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            draw(lastX, lastY, x, y);
            [lastX, lastY] = [x, y];
        }, { passive: false });

        canvas.addEventListener('touchend', () => drawing = false);
        canvas.addEventListener('touchcancel', () => drawing = false);


        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            socket.emit('clear-canvas', {
                studentName: user.displayName || 'Student',
                subject: currentSubjectName,
                page: currentPage,
                authorRole: user.role || 'STUDENT'
            });
            scheduleAutoSave();
        }

        let autosaveTimer = null;

        function scheduleAutoSave() {
            if (autosaveTimer) clearTimeout(autosaveTimer);
            autosaveTimer = setTimeout(() => saveNotebook(true), 800);
        }

        async function saveNotebook(silent = false) {
            const imageData = canvas.toDataURL();
            try {
                if (isDemo) {
                    const key = `demo-notebook-${user.displayName || 'Student'}-${currentSubjectName}-page-${currentPage}`;
                    localStorage.setItem(key, imageData);
                } else {
                    await fetch(`${BACKEND_BASE_URL}/api/notebook/save/me`, {
                        method: 'POST',
                        headers: authHeaders({ 'Content-Type': 'application/json' }),
                        body: JSON.stringify({
                            subject: currentSubjectName,
                            schoolYear: '2025-2026',
                            format: 'A4',
                            style: 'lined',
                            color: currentColor,
                            content: imageData,
                            pageNumber: currentPage
                        })
                    });
                }
                if (!silent) {
                    const msg = document.getElementById('savedMsg');
                    msg.style.display = 'inline';
                    setTimeout(() => msg.style.display = 'none', 2000);
                }
            } catch (err) {
                console.error('Could not save:', err);
            }
        }

        window.addEventListener('resize', resizeCanvas);
        loadSubject();

        socket.on('draw-stroke', (data) => {
            if (!data) return;
            if (data.studentName !== (user.displayName || 'Student')) return;
            if (!subjectMatch(data.subject, currentSubjectName)) return;
            if (parseInt(data.page) !== parseInt(currentPage)) return;
            if (data.tool === 'eraser') {
                ctx.clearRect(data.x1 - 10, data.y1 - 10, 20, 20);
            } else {
                ctx.beginPath();
                ctx.moveTo(data.x0, data.y0);
                ctx.lineTo(data.x1, data.y1);
                ctx.strokeStyle = data.color || '#111111';
                ctx.lineWidth = data.size || 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
            }
        });

        socket.on('clear-canvas', (data) => {
            if (!data) return;
            if (data.studentName !== (user.displayName || 'Student')) return;
            if (!subjectMatch(data.subject, currentSubjectName)) return;
            if (parseInt(data.page) !== parseInt(currentPage)) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        socket.on('page-change', (data) => {
            if (!data) return;
            if (data.studentName !== (user.displayName || 'Student')) return;
            if (!subjectMatch(data.subject, currentSubjectName)) return;
            currentPage = parseInt(data.page);
            updatePageControls();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            loadPage(currentSubjectName, currentPage);
        });
    </script>
</body>
</html>
