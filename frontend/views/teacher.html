<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDesk - Teacher</title>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="/css/teacher.css">
</head>
<body>
    <nav class="navbar">
        <h1>TechDesk</h1>
        <a href="/" class="logout">Logout</a>
    </nav>

    <div class="container">
        <div class="greeting">
            <h2>Hello, <span id="teacherName">Teacher</span></h2>
            <p>Teacher Dashboard</p>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <h3>📓 Student Notebooks</h3>
                <p>View and correct student work</p>
                <button class="action-btn" onclick="loadNotebooks()">View Notebooks</button>
            </div>
            <div class="card">
                <h3>📋 Mark Attendance</h3>
                <p>Record student attendance</p>
                <button class="action-btn" onclick="window.location.href='/attendance'">Mark Attendance</button>
            </div>
            <div class="card">
                <h3>💬 Messages</h3>
                <p>Contact students and parents</p>
                <button class="action-btn" onclick="window.location.href='/messages'">Open Messages</button>
            </div>
        </div>

        <div id="notebooksSection" style="display:none;">
            <h3 class="section-title">📓 Student Notebooks</h3>
            <div id="notebooksList"></div>
        </div>

        <div id="notebookViewer" style="display:none;">
            <div class="notebook-header">
                <button class="back-btn" onclick="backToList()">← Back</button>
                <h3 id="notebookTitle">Notebook</h3>
                <span class="live-badge" id="liveBadge" style="display:none;">🔴 Live</span>
            </div>
            <div class="notebook-canvas-wrapper" id="notebookCanvasWrapper">
                <img id="notebookImage" src="" style="position:absolute; top:0; left:0; width:100%; height:100%;" />
                <canvas id="teacherCanvas" style="position:absolute; top:0; left:0;"></canvas>
            </div>
        </div>
    </div>

    <script src="/js/teacher.js"></script>
</body>
</html>
