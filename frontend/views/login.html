<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDesk - Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="brand-lockup">
            <span class="logo-shell nav-logo-shell">
                <img src="/logo-tech-throne.png" alt="Tech Throne logo" class="brand-logo">
            </span>
            <span class="brand-copy">
                <span class="brand-kicker">Tech Throne</span>
                <span class="brand-name">TechDesk</span>
            </span>
        </a>
    </nav>
    <div class="login-container">
        <section class="brand-panel">
            <div class="brand-panel-card">
                <div class="logo-stage">
                    <div class="logo-orbit"></div>
                    <span class="logo-shell hero-logo-shell">
                        <img src="/logo-tech-throne.png" alt="Tech Throne logo" class="brand-logo hero-logo">
                    </span>
                </div>
                <div class="brand-panel-copy">
                    <span class="panel-kicker">Classroom Intelligence</span>
                    <h2>Tech Throne</h2>
                    <p>Structured learning support for students, sharp insight for teachers, and clear visibility for parents.</p>
                </div>
            </div>
        </section>
        <div class="login-box">
            <span class="login-kicker">Welcome Back</span>
            <h2>Login</h2>
            <p class="login-subtitle">Sign in to open your TechDesk workspace.</p>
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-group password-group">
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" id="togglePassword" aria-label="Show password">👁</button>
                </div>
                <button type="submit" class="login-btn">Login</button>
                <p id="errorMsg" class="error-msg"></p>
            </form>
        </div>
    </div>
    <script src="/js/login.js"></script>
    <script>
        function handlePasswordInput() {
            const val = document.getElementById('password').value;
            document.getElementById('eyeBtn').style.display = val.length > 0 ? 'flex' : 'none';
        }

        function showPassword() {
            document.getElementById('password').type = 'text';
            document.getElementById('eyeOpen').style.display = 'none';
            document.getElementById('eyeClosed').style.display = 'block';
        }

        function hidePassword() {
            document.getElementById('password').type = 'password';
            document.getElementById('eyeOpen').style.display = 'block';
            document.getElementById('eyeClosed').style.display = 'none';
        }
    </script>
</body>
</html>
