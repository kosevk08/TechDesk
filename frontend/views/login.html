<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDesk - Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <nav class="navbar">
        <h1>TechDesk</h1>
    </nav>
    <div class="login-container">
        <div class="login-box">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-group password-group">
                    <input type="password" id="password" placeholder="Password" required oninput="handlePasswordInput()">
                    <button type="button" id="eyeBtn" class="eye-btn" style="display:none;" onmousedown="showPassword()" onmouseup="hidePassword()" onmouseleave="hidePassword()" ontouchstart="showPassword()" ontouchend="hidePassword()">

                        <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>

                        <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <button type="submit" class="login-btn">Login</button>
                <p id="errorMsg" class="error-msg"></p>
            </form>
        </div>
    </div>
    <script src="/js/login.js"></script>
    <script>
        function handlePasswordInput() {
            const val = document.getElementById('password').value;
            document.getElementById('eyeBtn').style.display = val.length > 0 ? 'flex' : 'none';
        }

        function showPassword() {
            document.getElementById('password').type = 'text';
            document.getElementById('eyeOpen').style.display = 'none';
            document.getElementById('eyeClosed').style.display = 'block';
        }

        function hidePassword() {
            document.getElementById('password').type = 'password';
            document.getElementById('eyeOpen').style.display = 'block';
            document.getElementById('eyeClosed').style.display = 'none';
        }
    </script>
</body>
</html>
