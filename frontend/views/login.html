<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDesk</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="page-wrapper">
        <div class="login-box">
            <div class="logo-wrap">
                <img src="/logo.png" alt="TechDesk" class="logo-img">
                <span class="logo-text">TechDesk</span>
            </div>

            <h2>Sign In</h2>

            <form id="loginForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-group password-group">
                    <input type="password" id="password" placeholder="Password" required oninput="handlePasswordInput()">
                    <button type="button" id="eyeBtn" class="eye-btn" style="display:none;"
                        onmousedown="showPassword()" onmouseup="hidePassword()"
                        onmouseleave="hidePassword()" ontouchstart="showPassword()" ontouchend="hidePassword()">
                        <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                            <line x1="1" y1="1" x2="23" y2="23"/>
                        </svg>
                    </button>
                </div>
                <button type="submit" class="login-btn">Sign In</button>
                <p id="errorMsg" class="error-msg"></p>
            </form>
        </div>
    </div>

    <script src="/js/login.js"></script>
    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawShapes();
        }

        function drawShapes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const shapes = [
                { x: 0.08, y: 0.12, r: 220, sides: 6, rot: 20 },
                { x: 0.92, y: 0.1,  r: 160, sides: 4, rot: 45 },
                { x: 0.95, y: 0.6,  r: 250, sides: 6, rot: 10 },
                { x: 0.05, y: 0.8,  r: 180, sides: 4, rot: 30 },
                { x: 0.5,  y: 0.95, r: 130, sides: 6, rot: 60 },
                { x: 0.7,  y: 0.75, r: 100, sides: 3, rot: 15 },
                { x: 0.25, y: 0.05, r: 110, sides: 4, rot: 55 },
                { x: 0.6,  y: 0.15, r: 80,  sides: 6, rot: 40 },
            ];

            shapes.forEach(s => {
                ctx.save();
                ctx.translate(canvas.width * s.x, canvas.height * s.y);
                ctx.rotate((s.rot * Math.PI) / 180);
                ctx.beginPath();
                for (let i = 0; i < s.sides; i++) {
                    const angle = (i * 2 * Math.PI) / s.sides - Math.PI / 2;
                    const x = s.r * Math.cos(angle);
                    const y = s.r * Math.sin(angle);
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = 'rgba(255,255,255,0.04)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            });
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        function handlePasswordInput() {
            const val = document.getElementById('password').value;
            document.getElementById('eyeBtn').style.display = val.length > 0 ? 'flex' : 'none';
        }

        function showPassword() {
            document.getElementById('password').type = 'text';
            document.getElementById('eyeOpen').style.display = 'none';
            document.getElementById('eyeClosed').style.display = 'block';
        }

        function hidePassword() {
            document.getElementById('password').type = 'password';
            document.getElementById('eyeOpen').style.display = 'block';
            document.getElementById('eyeClosed').style.display = 'none';
        }
    </script>
</body>
</html>
