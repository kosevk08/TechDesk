<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDesk - Login</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>
    <canvas id="bgCanvas"></canvas>

    <div class="page-wrapper">

        <div class="left-panel">
            <div class="brand">
                <img src="/logo.png" alt="TechDesk Logo" class="logo-img">
                <h1>TechDesk</h1>
                <p>Smart Educational Platform</p>
            </div>
        </div>


        <div class="right-panel">
            <div class="login-box">
                <h2>Welcome back</h2>
                <p class="subtitle">Sign in to your account</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    <div class="input-group password-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required oninput="handlePasswordInput()">
                        <button type="button" id="eyeBtn" class="eye-btn" style="display:none;"
                            onmousedown="showPassword()" onmouseup="hidePassword()"
                            onmouseleave="hidePassword()" ontouchstart="showPassword()" ontouchend="hidePassword()">
                            <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <button type="submit" class="login-btn">Sign In</button>
                    <p id="errorMsg" class="error-msg"></p>
                </form>

                <p class="footer-text">TechDesk © 2026</p>
            </div>
        </div>
    </div>

    <script src="/js/login.js"></script>
    <script>

        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', () => { resizeCanvas(); drawShapes(); });

        function drawShapes() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const shapes = [
                { x: 0.1, y: 0.15, size: 180, rotation: 25 },
                { x: 0.85, y: 0.08, size: 120, rotation: 45 },
                { x: 0.92, y: 0.55, size: 200, rotation: 15 },
                { x: 0.05, y: 0.75, size: 150, rotation: 60 },
                { x: 0.5, y: 0.92, size: 100, rotation: 30 },
                { x: 0.75, y: 0.85, size: 80, rotation: 70 },
                { x: 0.3, y: 0.05, size: 90, rotation: 50 },
            ];

            shapes.forEach(s => {
                ctx.save();
                ctx.translate(canvas.width * s.x, canvas.height * s.y);
                ctx.rotate((s.rotation * Math.PI) / 180);
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i * Math.PI) / 3;
                    const x = s.size * Math.cos(angle);
                    const y = s.size * Math.sin(angle);
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = 'rgba(13, 27, 62, 0.07)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();
            });
        }

        drawShapes();

        function handlePasswordInput() {
            const val = document.getElementById('password').value;
            document.getElementById('eyeBtn').style.display = val.length > 0 ? 'flex' : 'none';
        }

        function showPassword() {
            document.getElementById('password').type = 'text';
            document.getElementById('eyeOpen').style.display = 'none';
            document.getElementById('eyeClosed').style.display = 'block';
        }

        function hidePassword() {
            document.getElementById('password').type = 'password';
            document.getElementById('eyeOpen').style.display = 'block';
            document.getElementById('eyeClosed').style.display = 'none';
        }
    </script>
</body>
</html>
