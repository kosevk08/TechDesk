<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDesk - Sign In</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .role-slider-container { margin: 25px 0; text-align: left; }
        #roleSlider { width: 100%; cursor: pointer; margin-top: 10px; }
        .role-labels { display: flex; justify-content: space-between; padding: 0 2px; font-size: 0.8em; color: #94a3b8; margin-top: 8px; font-weight: 500; }
        .toggle-auth { margin-top: 20px; font-size: 0.9em; text-align: center; color: #94a3b8; }
        .toggle-auth a { color: #6366f1; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="login-card">
        <!-- Login Form Container -->
        <div id="loginForm">
            <form>
                <h2>Welcome Back</h2>
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" id="togglePassword" aria-label="Toggle Password">👁</button>
                </div>
                <p id="errorMsg" class="error"></p>
                <button type="submit" class="primary-btn">Sign In</button>
                <div class="toggle-auth">
                    Don't have an account? <a href="#" onclick="toggleAuthMode()">Register</a>
                </div>
            </form>
        </div>

        <!-- Registration Form Container -->
        <div id="registerForm" style="display: none;">
            <form>
                <h2>Create Account</h2>
                <p class="insight-copy" style="margin-bottom: 20px;">Registration requires admin approval.</p>
                <div class="input-group">
                    <input type="email" id="regEmail" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <input type="password" id="regPassword" placeholder="Password" required>
                </div>
                <div class="input-group">
                    <input type="text" id="regEgn" placeholder="EGN (National ID)" required>
                </div>

                <!-- Role Slider -->
                <div class="role-slider-container">
                    <label for="roleSlider">I am registering as a:</label>
                    <input type="range" id="roleSlider" min="0" max="2" value="0" step="1">
                    <div class="role-labels">
                        <span>Student</span>
                        <span>Parent</span>
                        <span>Teacher</span>
                    </div>
                </div>

                <button type="submit" class="primary-btn">Request Access</button>
                <div class="toggle-auth">
                    Already a member? <a href="#" onclick="toggleAuthMode()">Login</a>
                </div>
            </form>
        </div>
        
        <div class="demo-link" style="text-align: center; margin-top: 15px;">
            <a href="#" id="openDemo" style="font-size: 0.85em; color: #6366f1;">Explore in Demo Mode</a>
        </div>
    </div>

    <!-- Modal for Demo (required by login.js) -->
    <div id="demoModal" class="modal" aria-hidden="true">
        <div class="demo-modal-content">
            <div id="demoProfiles"></div>
            <button id="closeDemo" class="secondary-btn">Cancel</button>
        </div>
    </div>

    <script src="/js/demo-data.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
