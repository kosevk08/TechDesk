<svg xmlns="http://www.w3.org/2000/svg" width="800" height="1000" viewBox="0 0 800 1000">
  <rect width="800" height="1000" fill="#f8fafc" />
  <rect x="60" y="60" width="680" height="880" rx="24" fill="#ffffff" stroke="#1f2937" stroke-width="2" />
  <text x="100" y="140" font-family="Trebuchet MS, sans-serif" font-size="40" fill="#0d1b3e">Maths</text>
  <text x="100" y="190" font-family="Trebuchet MS, sans-serif" font-size="20" fill="#4b5563">Quadratic Foundations</text>
  <text x="100" y="260" font-family="Trebuchet MS, sans-serif" font-size="18" fill="#111827">1. Solve x^2 - 5x + 6 = 0</text>
  <text x="100" y="300" font-family="Trebuchet MS, sans-serif" font-size="18" fill="#111827">2. Factorize x^2 - 9</text>
  <text x="100" y="340" font-family="Trebuchet MS, sans-serif" font-size="18" fill="#111827">3. Find the vertex of y = x^2 + 4x + 1</text>
  <rect x="100" y="420" width="600" height="2" fill="#cbd5f5" />
  <text x="100" y="470" font-family="Trebuchet MS, sans-serif" font-size="16" fill="#4b5563">Tip: Use x = [-b +/- sqrt(b^2-4ac)] / 2a</text>
</svg>
